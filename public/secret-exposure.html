<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>機密情報の露出 テスト</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="banner">⚠️ 意図的な脆弱性テストです（機密情報のハードコード / CWE-798, CWE-540）</div>
  <p><a href="index.html">← トップに戻る</a></p>

  <h1>クライアントサイドへの機密情報露出 <span class="tag vuln">VULNERABLE</span></h1>

  <div class="card">
    <p>
      以下のダミー API キーは、このページの HTML / JS ソースを開く（ブラウザの「ページのソースを表示」や
      DevTools）だけで誰でも閲覧できます。
    </p>
    <p>ブラウザで「ソースを表示」するか、下のボタンで再現してみてください。</p>
    <button id="revealBtn">埋め込まれた「秘密情報」を表示</button>
    <div id="secretBox" class="result-box"></div>
  </div>

  <!--
    VULNERABLE: HTML コメントの中に機密情報を書いてしまう例（ダミー値）。
    <meta name="internal-db-password" content="Sup3rSecretPassw0rd!">
  -->

  <script>
    // VULNERABLE: フロントエンドの JS に API キー・シークレットを直接埋め込んでいる（すべてダミー値）。
    // クライアントサイドのコードは常にエンドユーザーに配信されるため、
    // ここに書いた値はビルド後も丸見えになり、誰でも抜き出して悪用できてしまう。
    const DUMMY_API_KEY = 'sk_live_1234567890abcdefFAKEKEY';
    const DUMMY_DB_PASSWORD = 'Sup3rSecretPassw0rd!'; // ダミー値（実在しない）
    const DUMMY_AWS_SECRET_ACCESS_KEY = 'wJalrXUtnFEMI/K7MDENG/FAKEKEYEXAMPLE';

    // FIX: 本来あるべき対策
    //   1. 秘密情報はフロントエンドに一切含めない。API 呼び出しはバックエンド経由で行う。
    //   2. どうしてもクライアントで必要な公開用キー（例: 公開可能な analytics key）だけを使う。
    //   3. 秘密情報は環境変数 + サーバーサイドのシークレットマネージャ（AWS Secrets Manager 等）で管理する。
    //   4. .env や設定ファイルを誤って公開リポジトリ / ビルド成果物に含めないよう .gitignore や CI でチェックする。
    //   5. 万一漏えいした場合は直ちにキーをローテーション（無効化・再発行）する。

    document.getElementById('revealBtn').addEventListener('click', () => {
      document.getElementById('secretBox').textContent =
        `API Key: ${DUMMY_API_KEY}\nDB Password: ${DUMMY_DB_PASSWORD}\nAWS Secret: ${DUMMY_AWS_SECRET_ACCESS_KEY}`;
    });
  </script>
</body>
</html>
